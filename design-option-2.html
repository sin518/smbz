<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案二：现代简约 - 赛博八字</title>
  <style>
    :root { color-scheme: light }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F8F7EE;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 430px;
      background: #F8F7EE;
      min-height: 100vh;
      position: relative;
    }

    /* 顶部导航 - 简约风格 */
    .header {
      padding: 32px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #2f2d2a;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #34322f;
      letter-spacing: 0.04em;
    }
    .spacer { width: 40px; height: 40px; }

    /* 主体内容 */
    .main-content {
      padding: 16px 16px 32px;
    }

    /* 卡片组 - 紧凑排列 */
    .card-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    /* 表单卡片 - 更扁平 */
    .form-card {
      background: #fffdf7;
      border: 1px solid #e8e1cf;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 12px rgba(70, 53, 20, 0.04);
    }

    /* 字段行 - 紧凑布局 */
    .field-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .field-row:last-child { margin-bottom: 0; }

    .field-icon {
      width: 22px;
      height: 22px;
      color: #b79a5b;
      flex-shrink: 0;
    }

    .field-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: #898783;
      letter-spacing: 0.02em;
    }

    .field-input {
      width: 100%;
      border: none;
      background: #f6f0e2;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      color: #34322f;
      outline: none;
      transition: all 0.2s;
    }
    .field-input:focus {
      background: #f2ead8;
      box-shadow: 0 0 0 2px #e5d8bc;
    }
    .field-input::placeholder {
      color: #aaa8a1;
    }

    /* 性别选择器 - 圆角标签风格 */
    .gender-selector {
      display: flex;
      gap: 8px;
    }
    .gender-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: 2px solid #e8e1cf;
      background: #f6f0e2;
      font-size: 15px;
      font-weight: 600;
      color: #74716a;
      cursor: pointer;
      transition: all 0.2s;
    }
    .gender-btn.active {
      background: linear-gradient(135deg, #c92b12, #d44623);
      border-color: #c92b12;
      color: #f8d28b;
      box-shadow: 0 4px 12px rgba(201, 43, 18, 0.25);
    }

    /* 选择按钮 */
    .select-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: none;
      background: #f6f0e2;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #55514a;
      cursor: pointer;
      transition: all 0.2s;
    }
    .select-btn:active {
      background: #f2ead8;
    }
    .select-btn svg {
      width: 18px;
      height: 18px;
      color: #a9a59d;
      flex-shrink: 0;
    }
    .select-btn-text {
      flex: 1;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 地点显示 - 特殊样式 */
    .location-display {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 15px;
      font-weight: 600;
      color: #55514a;
    }
    .location-sep {
      color: #c9b896;
      font-weight: 400;
    }

    /* 开关组 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .toggle-title {
      font-size: 15px;
      font-weight: 600;
      color: #55514a;
    }
    .toggle-desc {
      font-size: 12px;
      color: #9d9a92;
    }

    .toggle {
      position: relative;
      width: 52px;
      height: 30px;
      background: #d9d6ce;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .toggle.active {
      background: linear-gradient(135deg, #b07222, #d9a450);
    }
    .toggle-knob {
      position: absolute;
      left: 3px;
      top: 3px;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform 0.3s;
    }
    .toggle.active .toggle-knob {
      transform: translateX(22px);
    }

    /* 分隔线 */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e8e1cf 20%, #e8e1cf 80%, transparent);
      margin: 16px 0;
    }

    /* 提交按钮 - 渐变风格 */
    .submit-btn {
      width: 100%;
      height: 56px;
      margin-top: 32px;
      display: block;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #000000, #2d2b28);
      color: #e8d4a7;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    .submit-btn:hover::before {
      left: 100%;
    }
    .submit-btn:active {
      transform: scale(0.98);
    }

    /* 提示卡片 */
    .tip-card {
      background: linear-gradient(135deg, #fbf4e4, #f6edd9);
      border: 1px solid #ead9b4;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
    .tip-icon {
      width: 24px;
      height: 24px;
      color: #b79a5b;
      flex-shrink: 0;
    }
    .tip-content {
      flex: 1;
    }
    .tip-title {
      font-size: 13px;
      font-weight: 600;
      color: #8a7340;
      margin-bottom: 4px;
    }
    .tip-text {
      font-size: 12px;
      line-height: 1.6;
      color: #9a7a39;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部导航 -->
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="title">赛博八字</h1>
      <div class="spacer"></div>
    </header>

    <!-- 主体内容 -->
    <main class="main-content">
      <!-- 基本信息 -->
      <div class="card-group">
        <div class="form-card">
          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div class="field-content">
              <label class="field-label">姓名</label>
              <input type="text" class="field-input" placeholder="请输入姓名" value="" />
            </div>
          </div>

          <div class="divider"></div>

          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div class="field-content">
              <label class="field-label">性别</label>
              <div class="gender-selector">
                <button class="gender-btn active">男</button>
                <button class="gender-btn">女</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 时间选择 -->
        <div class="form-card">
          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <div class="field-content">
              <label class="field-label">出生时间</label>
              <button class="select-btn">
                <span class="select-btn-text">请选择</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- 地点选择 -->
        <div class="form-card">
          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <div class="field-content">
              <label class="field-label">出生地点</label>
              <button class="select-btn">
                <div class="location-display">
                  <span>北京市</span>
                  <span class="location-sep">·</span>
                  <span>北京市</span>
                  <span class="location-sep">·</span>
                  <span>东城区</span>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- 真太阳时 -->
        <div class="form-card">
          <div class="toggle-row">
            <div class="toggle-info">
              <div class="toggle-title">真太阳时校正</div>
              <div class="toggle-desc">根据经度校正时间</div>
            </div>
            <div class="toggle">
              <div class="toggle-knob"></div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="toggle-row">
            <div class="toggle-info">
              <div class="toggle-title">校正时间</div>
              <div class="toggle-desc" style="color: #aaa8a1;">未启用</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 提示信息 -->
      <div class="tip-card">
        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4M12 8h.01"></path>
        </svg>
        <div class="tip-content">
          <div class="tip-title">关于真太阳时</div>
          <div class="tip-text">真太阳时会根据出生地经度校正时间，使八字计算更精确。建议开启此选项以获得更准确的排盘结果。</div>
        </div>
      </div>

      <!-- 提交按钮 -->
      <button class="submit-btn">开始排盘</button>
    </main>
  </div>

  <script>
    // 性别选择
    document.querySelectorAll('.gender-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // 开关切换
    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('active');
        const row = toggle.closest('.toggle-row');
        const nextRow = row.nextElementSibling?.nextElementSibling;
        if (nextRow && toggle.classList.contains('active')) {
          nextRow.querySelector('.toggle-desc').textContent = '2024-01-01 12:15 (+8分)';
          nextRow.querySelector('.toggle-desc').style.color = '#55514a';
        } else if (nextRow) {
          nextRow.querySelector('.toggle-desc').textContent = '未启用';
          nextRow.querySelector('.toggle-desc').style.color = '#aaa8a1';
        }
      });
    });
  </script>
</body>
</html>
